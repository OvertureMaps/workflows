---
# Overture PRojection — unit test workflow.
#
# Runs the Node built-in test runner against all lib/__tests__/*.test.js files
# whenever the action's scripts are modified.
#
name: Overture PRojection Tests

on:
  pull_request:
    paths:
      - .github/actions/overture-projection/scripts/**

permissions:
  contents: read # Required to checkout the repository

# Cancel in-progress test runs when new commits are pushed.
concurrency:
  group: test-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Run tests
        run: |
          node --test ".github/actions/overture-projection/scripts/lib/__tests__/*.test.js"
