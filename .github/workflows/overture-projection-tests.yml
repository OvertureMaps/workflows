---
# Overture PRojection — unit test workflow.
#
# Runs the Node built-in test runner against all lib/__tests__/*.test.js files
# whenever the action's scripts are modified.
#
name: Overture PRojection Tests

on:
  pull_request:
    paths:
      - .github/actions/overture-projection/scripts/**

permissions:
  contents: read # Required to checkout the repository

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Run tests
        run: |
          node --test ".github/actions/overture-projection/scripts/lib/__tests__/*.test.js"
