# Reusable workflow for applying OpenTofu code.
name: Tofu Apply

on:
  workflow_call:
    inputs:
      environment:
        description: 'Name of the Github environment to use'
        required: true
        type: string
      oidc_role_arn:
        description: 'ARN of the IAM role to assume with OIDC'
        required: true
        type: string
      tofu_workspace:
        description: 'Name of the OpenTofu workspace to use'
        required: false
        default: ''
        type: string
      tofu_variables:
        description: 'Variables to pass to OpenTofu'
        required: false
        default: ''
        type: string
      tofu_backend_config:
        description: 'Backend configuration for OpenTofu'
        required: false
        default: ''
        type: string
      tofu_plan_label:
        description: 'Label for the OpenTofu plan output'
        required: false
        default: ''
        type: string
      tofu_var_file:
        description: 'List of var file paths, one per line'
        required: false
        default: ''
        type: string
      tofu_auto_approve:
        description: 'Automatically approve and apply plan'
        required: false
        default: "false"
        type: string
      oidc_audience:
        description: 'OIDC audience to authenticate against'
        required: false
        default: 'sts.amazonaws.com'
        type: string
      oidc_region:
        description: 'Default region for AWS client'
        required: false
        default: us-west-2
        type: string
      trigger_apply:
        description: 'Whether to trigger the OpenTofu apply job'
        required: false
        default: true
        type: boolean
      env:
        description: 'Extra environment variables'
        required: false
        type: string
      secrets_manager_keys:
        description: 'List of keys to fetch from AWS Secrets Manager'
        required: false
        default: ''
        type: string
      artifact_name:
        description: "The artifact name to download"
        required: false
        type: string
      artifact_path:
        description: "The artifact path to download"
        required: false
        type: string
      azure_oidc:
        description: "Whether to log in to Azure with OIDC (requires secrets set up)"
        required: false
        type: boolean
        default: false
    secrets:
      env_secret:
        description: 'Extra secret environment variables'
        required: false
      tofu_secret_variables:
        description: 'Variables that contains secrets to pass to OpenTofu'
        required: false
      http_credentials:
        description: 'Credentials that will be used for fetching modules sources'
        required: false


permissions: {}

jobs:
  tofu_apply:
    runs-on: ubuntu-latest
    name: "Tofu Apply - ${{ inputs.environment }}"
    environment: ${{ inputs.environment }}
    if: ${{ inputs.trigger_apply }}
    permissions:
      id-token: write      # Required for OIDC authentication with AWS
      contents: read
      pull-requests: write # Required for dflook/tofu-apply to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Environment Variables
        id: set-env
        env:
          INPUT_ENV: ${{ inputs.env }}
          INPUT_ENV_SECRET: ${{ secrets.env_secret }}
          INPUT_TOFU_SECRET_VARS: ${{ secrets.tofu_secret_variables }}
        run: |
            echo "$INPUT_ENV" >> $GITHUB_ENV
            for val in $(echo "$INPUT_ENV_SECRET" | cut -d'=' -f2-); do echo ::add-mask::$val ; done
            for val in $(echo "$INPUT_TOFU_SECRET_VARS" | cut -d'=' -f2-); do echo ::add-mask::$val ; done
            echo "$INPUT_ENV_SECRET" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          audience: ${{ inputs.oidc_audience }}
          role-to-assume: ${{ inputs.oidc_role_arn }}
          aws-region: ${{ inputs.oidc_region }}

      - name: Read secrets from AWS Secrets Manager into environment variables
        if: ${{ inputs.secrets_manager_keys != '' }}
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 # v3.0.1
        with:
          secret-ids: ${{ inputs.secrets_manager_keys }}
          name-transformation: none

      - name: Download artifact
        if: ${{ inputs.artifact_name != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path || '.' }}

      - name: Tofu Apply
        uses: dflook/tofu-apply@c254eb5b2e48978c05587373100d26b604c2182d # v2.2.3
        with:
          label: ${{ inputs.tofu_plan_label || inputs.environment }}
          workspace: ${{ inputs.tofu_workspace || inputs.environment }}
          backend_config: ${{ inputs.tofu_backend_config }}
          var_file: ${{ inputs.tofu_var_file }}
          auto_approve: ${{ inputs.tofu_auto_approve }}
          variables: |
            ${{ inputs.tofu_variables }}
            ${{ secrets.tofu_secret_variables }}
        env:
          TERRAFORM_HTTP_CREDENTIALS: ${{ env.TERRAFORM_HTTP_CREDENTIALS || secrets.http_credentials }}
          TERRAFORM_PRE_RUN: |
            ${{ inputs.azure_oidc && 'curl -skL https://aka.ms/InstallAzureCLIDeb | bash' || '' }}
          ARM_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
