---
# Reusable workflow to validate PR titles against Overture's formatting standards.
#
# This workflow enforces the [TYPE] bracket format for PR titles and provides
# helpful feedback comments when validation fails.
#
# Required format: [TYPE] Description (Fixes #issue)
# Optional scope:  [TYPE](scope) Description (Fixes #issue)
# Breaking change: [BREAKING][TYPE] Description (Fixes #issue)
#
# Usage: Reference this workflow from any repo in the OvertureMaps organization.
#
# Example (.github/workflows/pr-validation.yml):
#   name: PR Title Validation
#   on:
#     pull_request:
#       types: [opened, reopened, edited, synchronize]
#   jobs:
#     validate-title:
#       uses: OvertureMaps/workflows/.github/workflows/validate-pr-title.yml@main
#
name: Validate PR Title

on: # zizmor: ignore[concurrency-limits]
  workflow_call:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - opened
      - reopened
      - edited
      - synchronize

# pull_request_target runs with write permissions so this workflow works for fork PRs.
# SECURITY: This workflow must never check out or execute code from the PR branch.
# If you need to add a step that does so, use the workflow_run pattern instead.
permissions:
  contents: none # no repository content access needed

jobs:
  validate:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      contents: none # no repository content access needed
      pull-requests: write # to post PR title validation comments
      issues: write # to post PR-related issue comments via sticky comment action
      statuses: write # to update commit status checks
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Match Overture's [TYPE] bracket format:
          #   [BUG] Fix something
          #   [REFACTOR](schema) Consolidate logic
          #   [BREAKING][FEATURE] Change API response format
          headerPattern: '^\[(?:BREAKING\]\[)?(\w+)\](?:\(([^)]+)\))?\s(.+)$'
          headerPatternCorrespondence: type, scope, subject
          requireScope: false
          # Allowed types, matching the Issue/PR types defined in github-usage.md
          types: |
            BUG
            FEATURE
            ENHANCEMENT
            DOCS
            REFACTOR
            TEST
            CHORE
            PERFORMANCE
            SECURITY
            INVESTIGATION

          # Allow [WIP] prefix for draft work on repos without draft PR support.
          wip: true

          # Allow opt-out via labels, since some repos may have automated PRs that don't follow the new format.
          ignoreLabels: |
            bot
            ignore-semantic-pull-request

      - name: Post validation failure comment
        if: ${{ failure() && steps.lint_pr_title.outputs.error_message }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pr-title-validation-error
          message: |
            ## ❌ PR Title Validation Failed

            **Error:** ${{ steps.lint_pr_title.outputs.error_message }}

            ---

            **Examples:**
            - `[BUG] Fix null pointer exception in geometry validator`
            - `[REFACTOR](schema) Consolidate validation logic`

            See the [Overture Maps Foundation GitHub usage guidelines](https://github.com/OvertureMaps/operating-procedures/blob/main/development/github-usage.md) for full documentation.

      - name: Delete comment on success
        if: ${{ success() }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pr-title-validation-error
          delete: true
