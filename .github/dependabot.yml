---
version: 2
updates:

  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "actions/*"
          - "aws-actions/*"
    labels:
      - "bot"
    commit-message:
      prefix: "[CHORE](gha)"
      include: "scope"
    cooldown:
      default-days: 7

  # Maintain composite action dependencies
  - package-ecosystem: "github-actions"
    directories:
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "bot"
    commit-message:
      prefix: "[CHORE](gha)"
      include: "scope"
    cooldown:
      default-days: 7
