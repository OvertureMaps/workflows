---
name: Generate Schema Docs
description: >
  Run the overture-codegen tool to generate markdown documentation
  from the Pydantic schema models in the OvertureMaps/schema repository.

inputs:
  output-dir:
    description: 'Path to write generated markdown into (absolute, or relative to GITHUB_WORKSPACE)'
    required: true
  schema-ref:
    description: 'Branch, tag, or SHA of OvertureMaps/schema to check out; defaults to the repo default branch'
    required: false
    default: ''
  schema-path:
    description: 'Path to the schema repo (relative to GITHUB_WORKSPACE); used for checkout destination, Python version file, and package installation'
    required: false
    default: '_schema'
  skip-checkout:
    description: 'Skip checking out the schema repo (use when the repo is already checked out at schema-path)'
    required: false
    default: 'false'

outputs:
  schema-sha:
    description: 'The exact commit SHA of the OvertureMaps/schema repo that was checked out'
    value: ${{ steps.get-sha.outputs.commit || steps.get-sha-fallback.outputs.sha }}
  schema-ref:
    description: 'The ref (branch/tag/SHA) of the OvertureMaps/schema repo that was checked out'
    value: ${{ steps.get-sha.outputs.ref || steps.get-sha-fallback.outputs.ref }}

runs:
  using: composite
  steps:
    - name: Check out schema repo
      id: get-sha
      if: inputs.skip-checkout == 'false'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: OvertureMaps/schema
        ref: ${{ inputs.schema-ref }}
        path: ${{ inputs.schema-path }}
        persist-credentials: false

    - name: Resolve schema SHA (skip-checkout true)
      id: get-sha-fallback
      if: inputs.skip-checkout == 'true'
      shell: bash
      working-directory: ${{ inputs.schema-path }}
      run: |
        echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        echo "ref=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version-file: ${{ inputs.schema-path }}/.python-version

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

    - name: Install schema packages
      shell: bash
      working-directory: ${{ inputs.schema-path }}
      run: uv sync --package overture-schema --package overture-schema-codegen --no-dev

    - name: Generate markdown docs
      shell: bash
      working-directory: ${{ inputs.schema-path }}
      run: uv run overture-codegen generate --format markdown --output-dir "${INPUTS_OUTPUT_DIR}"
      env:
        INPUTS_OUTPUT_DIR: ${{ inputs.output-dir }}
