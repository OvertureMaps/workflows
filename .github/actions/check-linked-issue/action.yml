---
name: Check Linked Issue
description: >
  Checks that a pull request has at least one linked GitHub issue via
  closingIssuesReferences. Covers 'Fixes #123', 'Closes owner/repo#456',
  and issues linked manually through the GitHub UI.

inputs:
  minimumLinkedIssues:
    description: Minimum number of linked issues required
    required: false
    default: 1
  appId:
    description: GitHub App ID used to generate an installation token for cross-repo linked issue reads
    required: false
    default: "2932845" #https://github.com/organizations/OvertureMaps/settings/apps/overture-check-linked-issue
  privateKey:
    description: >
      GitHub App private key used to generate an installation token.
      Pass secrets.CHECK_LINKED_ISSUE_APP_PEM. Cannot be defaulted
      automatically as GitHub Actions does not allow secrets as input defaults.
      When omitted, falls back to the default GITHUB_TOKEN (cross-repo linked
      issue reads will not work in that case).
    required: false
    default: ""
  ignoreDependabot:
    description: Skip the linked issue check when the PR author is dependabot[bot]
    required: false
    default: "true"
  ignoreOverturePullRequester:
    description: Skip the linked issue check when the PR author is overture-pull-requester[bot]
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Mask private key
      if: ${{ inputs.privateKey != '' }}
      shell: bash
      run: |
        echo "::group::Masking private key"
        echo "::add-mask::${INPUTS_PRIVATEKEY}"
        echo "::endgroup::"
      env:
        INPUTS_PRIVATEKEY: ${{ inputs.privateKey }}

    - name: Generate GitHub App token
      id: app-token
      if: ${{ inputs.privateKey != '' }}
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 # zizmor: ignore[github-app,ref-version-mismatch] -- intentional: org-wide reusable workflow; dedicated GH App limits risk in lieu of per-repo scoping
      with:
        app-id: ${{ inputs.appId }}
        private-key: ${{ inputs.privateKey }}
        owner: ${{ github.repository_owner }} # zizmor: ignore[github-app] -- intentional: org-wide reusable workflow; dedicated GH App limits risk in lieu of per-repo scoping

    - name: Check for linked issue via GraphQL
      id: check_issue
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ steps.app-token.outputs.token || github.token }}
        script: |
          const prNumber = context.payload.pull_request.number;
          const { owner, repo } = context.repo;
          const minimumLinkedIssues = parseInt(core.getInput('minimumLinkedIssues')) || 1;
          const ignoreDependabot = core.getInput('ignoreDependabot') !== 'false';
          const ignoreOverturePullRequester = core.getInput('ignoreOverturePullRequester') !== 'false';

          if (ignoreDependabot && context.payload.pull_request.user.login === 'dependabot[bot]') {
            core.info('⏭️ Skipping linked issue check for dependabot PR.');
            return;
          }

          if (ignoreOverturePullRequester && context.payload.pull_request.user.login === 'overture-pull-requester[bot]') {
            core.info('⏭️ Skipping linked issue check for overture-pull-requester PR.');
            return;
          }

          const query = `
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  closingIssuesReferences(first: 10) {
                    nodes {
                      number
                      title
                      state
                      url
                    }
                  }
                }
              }
            }
          `;

          const result = await github.graphql(query, {
            owner,
            repo,
            number: prNumber
          });

          const issues =
            result.repository.pullRequest.closingIssuesReferences.nodes;

          core.debug(`${JSON.stringify(result, null, 2)}`);

          if (!issues || issues.length < minimumLinkedIssues) {
            const message =
              `This PR does not reference enough linked issues (found ${issues.length}, required ${minimumLinkedIssues}).\n\n` +
              "Please link an issue from this repository, using `Fixes #123`, `Closes #123`, or the " +
              "[GitHub UI](https://docs.github.com/en/issues/tracking-your-work-with-issues/using-issues/linking-a-pull-request-to-an-issue).\n\n" +
              "After adding a linked issue, you may need to manually re-run this check from the Checks tab to update the status.";
            core.setOutput('error_message', message);
            core.setFailed(`❌ ${message}`);
          } else {
            core.info(`✅ ${issues.length} linked issues found out of ${minimumLinkedIssues} required:`);
            issues.forEach(issue => {
              core.info(`  #${issue.number} - ${issue.title} (${issue.state}) ${issue.url}`);
            });
          }

    - name: Post linked issue check failure comment
      if: ${{ failure() && steps.check_issue.outputs.error_message != '' }}
      uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
      with:
        header: check-linked-issue-error
        message: |
          ## ❌ Linked Issue Check Failed

          ${{ steps.check_issue.outputs.error_message }}

    - name: Delete comment on success
      if: ${{ success() }}
      uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
      with:
        header: check-linked-issue-error
        delete: true
