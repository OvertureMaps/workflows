name: Authenticate with AWS CodeArtifact
description: >
  Assumes an IAM role via OIDC, acquires a CodeArtifact authorization token,
  and writes Maven settings.xml so subsequent mvn commands can resolve and
  deploy artifacts. Must be called before any Maven step that touches CodeArtifact.

inputs:
  aws-role-arn:
    description: IAM role ARN to assume via OIDC
    required: true
  aws-region:
    description: AWS region where CodeArtifact is hosted
    required: false
    default: us-west-2
  codeartifact-domain:
    description: CodeArtifact domain name
    required: true
  codeartifact-domain-owner:
    description: AWS account ID that owns the CodeArtifact domain
    required: true
  codeartifact-repository:
    description: CodeArtifact repository name
    required: true
  maven-repository-id:
    description: >
      The Maven <server>/<repository> id written to settings.xml. Must match
      the id a consuming pom.xml's <repositories><repository> declares,
      otherwise Maven will not attach CodeArtifact credentials when resolving
      dependencies (deploys are unaffected since they pipe the URL directly
      via -DaltDeploymentRepository). Defaults to "codeartifact", the
      convention documented across consuming repos.
    required: false
    default: codeartifact
  token-env-var:
    description: >
      Opt-in: name of the environment variable to export the masked
      CodeArtifact authorization token as, available to every later step in
      the job. Empty by default, meaning no $GITHUB_ENV export happens and
      callers only get the `token` output, scoped to whichever step(s)
      explicitly reference it. Set this (e.g. to CODEARTIFACT_AUTH_TOKEN,
      following the same convention as aws-actions/configure-aws-credentials
      and AWS's own CodeArtifact docs) only if you have a tool that shells
      out to Maven internally (e.g. `databricks bundle deploy`) and expects
      the token ambiently under a specific env var name.
    required: false
    default: ""

outputs:
  codeartifact-domain:
    description: CodeArtifact domain name (echo of the input, for piping to later steps)
    value: ${{ inputs.codeartifact-domain }}
  codeartifact-domain-owner:
    description: AWS account ID that owns the CodeArtifact domain (echo of the input)
    value: ${{ inputs.codeartifact-domain-owner }}
  codeartifact-repository:
    description: CodeArtifact repository name (echo of the input)
    value: ${{ inputs.codeartifact-repository }}
  aws-region:
    description: AWS region where CodeArtifact is hosted (echo of the input)
    value: ${{ inputs.aws-region }}
  repository-url:
    description: >
      Fully-composed CodeArtifact Maven repository URL. Pipe this to a later
      mvn step (e.g. -DaltDeploymentRepository / -Durl) instead of rebuilding it.
    value: "https://${{ inputs.codeartifact-domain }}-${{ inputs.codeartifact-domain-owner }}.d.codeartifact.${{ inputs.aws-region }}.amazonaws.com/maven/${{ inputs.codeartifact-repository }}/"
  token:
    description: >
      The masked CodeArtifact authorization token. Use this to wire the
      token narrowly onto just the step(s) that need it, e.g.
      `env: MY_VAR: <expression referencing this output>`. It is not
      exported to $GITHUB_ENV
      unless the caller explicitly opts in via the `token-env-var` input.
    value: ${{ steps.token.outputs.token }}

runs:
  using: "composite"
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Generate CodeArtifact Token
      id: token
      shell: bash
      # The token is masked and always exported as this action's `token`
      # output, so callers can wire it narrowly onto just the step(s) that
      # need it, e.g. `env: MY_VAR: <expression referencing this output>`. It
      # is NOT written to $GITHUB_ENV by default -- that would make it
      # ambiently readable by every later step in the job, which is broader
      # exposure than most callers need. Set `token-env-var` (e.g. to
      # "CODEARTIFACT_AUTH_TOKEN", following the same convention as
      # aws-actions/configure-aws-credentials and AWS's own CodeArtifact
      # docs) to opt in to the $GITHUB_ENV export for tools that shell out to
      # Maven internally (e.g. `databricks bundle deploy`) and expect the
      # token ambiently under a specific env var name. Either way it's still
      # embedded into ~/.m2/settings.xml, so the runner must be trusted for
      # the job's duration regardless.
      env:
        CODEARTIFACT_DOMAIN: ${{ inputs.codeartifact-domain }}
        CODEARTIFACT_DOMAIN_OWNER: ${{ inputs.codeartifact-domain-owner }}
        AWS_REGION: ${{ inputs.aws-region }}
        TOKEN_ENV_VAR: ${{ inputs.token-env-var }}
      run: | # zizmor: ignore[github-env] -- token-env-var is a trusted input controlled by this action's own caller (a workflow author), not by pull_request_target/workflow_run event data; TOKEN is an AWS API response, not attacker-controlled
        TOKEN=$(aws codeartifact get-authorization-token \
          --domain "$CODEARTIFACT_DOMAIN" \
          --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
          --region "$AWS_REGION" \
          --query authorizationToken \
          --output text)
        echo "::add-mask::$TOKEN"
        echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        if [ -n "$TOKEN_ENV_VAR" ]; then
          echo "${TOKEN_ENV_VAR}=${TOKEN}" >> "$GITHUB_ENV"
        fi

    # settings.xml is written inline rather than via actions/setup-java's
    # generator. CodeArtifact needs both a <server> (credentials) and a
    # <repository> (resolve URL) in settings.xml; setup-java emits only
    # <servers> with ${env.*} credential placeholders, which would drop the
    # resolve repository and force the token into the environment at mvn time.
    # An inline writer also keeps this auth action JDK-agnostic.
    #
    # The <server> and <repository> ids must be IDENTICAL for Maven to attach
    # credentials when resolving dependencies (deploys don't need this since
    # they pipe the URL directly via -DaltDeploymentRepository=<id>::<url>).
    # They previously used codeartifact-domain (e.g. "overture-scala"), which
    # silently broke dependency resolution for any consumer whose pom.xml
    # repository id didn't happen to match the domain name. Use the dedicated
    # maven-repository-id input (default "codeartifact") instead, so the id is
    # stable and matches the convention already documented in consuming repos.
    - name: Configure Maven Settings for CodeArtifact
      shell: bash
      env:
        MAVEN_REPOSITORY_ID: ${{ inputs.maven-repository-id }}
        CODEARTIFACT_REPO_URL: "https://${{ inputs.codeartifact-domain }}-${{ inputs.codeartifact-domain-owner }}.d.codeartifact.${{ inputs.aws-region }}.amazonaws.com/maven/${{ inputs.codeartifact-repository }}/"
        CODEARTIFACT_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<EOF
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>${MAVEN_REPOSITORY_ID}</id>
              <username>aws</username>
              <password>${CODEARTIFACT_TOKEN}</password>
            </server>
          </servers>
          <profiles>
            <profile>
              <id>codeartifact</id>
              <repositories>
                <repository>
                  <id>${MAVEN_REPOSITORY_ID}</id>
                  <url>${CODEARTIFACT_REPO_URL}</url>
                </repository>
              </repositories>
            </profile>
          </profiles>
          <activeProfiles>
            <activeProfile>codeartifact</activeProfile>
          </activeProfiles>
        </settings>
        EOF
